<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Servicing · CBLOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg0:#04060a; --bg1:#0a0f18; --surface:rgba(14,20,32,.75); --surface2:rgba(18,26,42,.92); --border:rgba(0,245,212,.1); --border-strong:rgba(0,245,212,.28); --accent:#00e5c8; --text:#eef2f7; --text-dim:#8b9cb5; --shadow:0 8px 40px rgba(0,0,0,.55); --radius:12px; --font:'Outfit',system-ui,sans-serif; --mono:'JetBrains Mono',monospace; }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:var(--font);background:var(--bg0);background-image:radial-gradient(ellipse 110% 60% at 50% -25%,rgba(0,229,200,.08),transparent 50%),linear-gradient(180deg,var(--bg1),var(--bg0) 45%);color:var(--text);line-height:1.5}
    header.nav{position:sticky;top:0;z-index:100;display:flex;flex-wrap:wrap;align-items:center;gap:.5rem 1.25rem;padding:.65rem 1.35rem;background:rgba(4,6,10,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
    .brand{display:flex;align-items:center;gap:.6rem;text-decoration:none;color:var(--text)}
    .brand-mark{width:11px;height:11px;border-radius:3px;background:linear-gradient(145deg,var(--accent),#4d7cff);box-shadow:0 0 16px rgba(0,229,200,.45)}
    .brand-text{font-weight:700;font-size:1.02rem}
    .brand-sub{display:block;font-size:.58rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.16em}
    .nav-links{display:flex;flex-wrap:wrap;gap:.1rem}
    .nav-links a{color:var(--text-dim);text-decoration:none;font-size:.76rem;padding:.38rem .65rem;border-radius:6px}
    .nav-links a:hover{color:var(--accent);background:rgba(0,229,200,.07)}
    .nav-links a.active{color:var(--accent);background:rgba(0,229,200,.14)}
    .wrap{max-width:1040px;margin:0 auto;padding:1.65rem 1.2rem 3rem}
    .page-title{font-size:1.6rem;font-weight:700;margin:0 0 .25rem}
    .page-sub{font-size:.88rem;color:var(--text-dim);margin:0 0 1.35rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem 1.45rem;margin-bottom:1.2rem;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
    .card h1{font-size:.95rem;font-weight:600;margin:0 0 1rem}
    label{display:block;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin:.8rem 0 .32rem}
    input[type="number"]{width:100%;max-width:260px;padding:.62rem .85rem;background:var(--surface2);border:1px solid rgba(139,156,181,.22);border-radius:8px;color:var(--text);font-size:.94rem}
    input:focus{outline:0;border-color:var(--border-strong);box-shadow:0 0 0 3px rgba(0,229,200,.1)}
    button{margin:.4rem .45rem 0 0;padding:.48rem .9rem;font-size:.8rem;font-weight:600;border:0;border-radius:8px;cursor:pointer;background:linear-gradient(135deg,var(--accent),#0ab896);color:#031a16;font-family:var(--font)}
    button.secondary{background:transparent;color:var(--text);border:1px solid rgba(139,156,181,.32)}
    button.secondary:hover{border-color:var(--accent);color:var(--accent)}
    table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:.65rem;font-family:var(--mono)}
    th,td{border-bottom:1px solid rgba(139,156,181,.1);padding:.5rem .55rem;text-align:left}
    th{font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);font-family:var(--font);background:rgba(0,0,0,.28)}
    pre{margin-top:.75rem;padding:.75rem;border-radius:8px;background:rgba(0,0,0,.4);border:1px solid var(--border);font-family:var(--mono);font-size:.8rem;color:var(--text-dim);white-space:pre-wrap}
  </style>
</head>
<body>
  <header class="nav">
    <a href="/index.html" class="brand"><span class="brand-mark"></span><span class="brand-text">CBLOS<span class="brand-sub">Lending Operations</span></span></a>
    <nav class="nav-links">
      <a href="/index.html">Dashboard</a>
      <a href="/customers.html">Clients</a>
      <a href="/officers.html">Officers</a>
      <a href="/loans.html">Applications</a>
      <a href="/collateral.html">Collateral</a>
      <a href="/documents.html">Documents</a>
      <a href="/credit.html">Risk</a>
      <a href="/approvals.html">Decisions</a>
      <a href="/disbursements.html">Treasury</a>
      <a href="/repayments.html" class="active">Servicing</a>
    </nav>
  </header>
  <div class="wrap">
    <h1 class="page-title">Loan servicing</h1>
    <p class="page-sub">Amortization and settlement.</p>
    <div class="card">
      <h1>Installment schedule</h1>
      <label for="accountId">Account ID</label>
      <input type="number" id="accountId" min="1" required>
      <button type="button" id="btnSched">Retrieve</button>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Inst.</th><th>Row</th><th>Due</th><th>Amount</th><th>State</th><th></th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <pre id="log">—</pre>
    </div>
  </div>
  <script>
    function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    var lastAccountId = null;
    async function loadSched() {
      var accountId = document.getElementById('accountId').value;
      lastAccountId = accountId;
      var tb = document.getElementById('tbody');
      var log = document.getElementById('log'); tb.innerHTML = ''; log.textContent = '—';
      if (!accountId) return;
      var res = await fetch('/api/repayments/schedule/' + encodeURIComponent(accountId));
      var text = await res.text();
      var data; try { data = JSON.parse(text); } catch (e) { data = null; }
      if (!res.ok) { log.textContent = text; return; }
      (data || []).forEach(function (row) {
        var tr = document.createElement('tr');
        var rowId = row.id != null ? row.id : '';
        var inst = row.installmentNumber != null ? row.installmentNumber : '';
        var due = row.dueDate || '';
        var amt = row.installmentAmount != null ? row.installmentAmount : '';
        var st = row.status || '';
        tr.innerHTML = '<td>' + inst + '</td><td>' + rowId + '</td><td>' + escapeHtml(String(due)) + '</td><td>' + escapeHtml(String(amt)) + '</td><td>' + escapeHtml(String(st)) + '</td><td><button type="button" class="secondary pay-btn" data-row="' + rowId + '">Settle</button></td>';
        tb.appendChild(tr);
      });
      tb.querySelectorAll('.pay-btn').forEach(function (b) {
        b.onclick = async function () {
          if (!lastAccountId || !b.dataset.row) return;
          var url = '/api/repayments/account/' + encodeURIComponent(lastAccountId) + '/pay/' + encodeURIComponent(b.dataset.row);
          var r = await fetch(url, { method: 'PUT' });
          var t = await r.text();
          document.getElementById('log').textContent = (r.ok ? '' : 'HTTP ' + r.status + '\n') + t;
          loadSched();
        };
      });
    }
    document.getElementById('btnSched').onclick = loadSched;
  </script>
</body>
</html>
