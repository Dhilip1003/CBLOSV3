<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Collateral · CBLOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg0:#04060a; --bg1:#0a0f18; --surface:rgba(14,20,32,.75); --surface2:rgba(18,26,42,.92); --border:rgba(0,245,212,.1); --border-strong:rgba(0,245,212,.28); --accent:#00e5c8; --text:#eef2f7; --text-dim:#8b9cb5; --shadow:0 8px 40px rgba(0,0,0,.55); --radius:12px; --font:'Outfit',system-ui,sans-serif; }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:var(--font);background:var(--bg0);background-image:radial-gradient(ellipse 110% 60% at 50% -25%,rgba(0,229,200,.08),transparent 50%),linear-gradient(180deg,var(--bg1),var(--bg0) 45%);color:var(--text);line-height:1.5}
    header.nav{position:sticky;top:0;z-index:100;display:flex;flex-wrap:wrap;align-items:center;gap:.5rem 1.25rem;padding:.65rem 1.35rem;background:rgba(4,6,10,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
    .brand{display:flex;align-items:center;gap:.6rem;text-decoration:none;color:var(--text)}
    .brand-mark{width:11px;height:11px;border-radius:3px;background:linear-gradient(145deg,var(--accent),#4d7cff);box-shadow:0 0 16px rgba(0,229,200,.45)}
    .brand-text{font-weight:700;font-size:1.02rem}
    .brand-sub{display:block;font-size:.58rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.16em}
    .nav-links{display:flex;flex-wrap:wrap;gap:.1rem}
    .nav-links a{color:var(--text-dim);text-decoration:none;font-size:.76rem;padding:.38rem .65rem;border-radius:6px}
    .nav-links a:hover{color:var(--accent);background:rgba(0,229,200,.07)}
    .nav-links a.active{color:var(--accent);background:rgba(0,229,200,.14)}
    .wrap{max-width:960px;margin:0 auto;padding:1.65rem 1.2rem 3rem}
    .page-title{font-size:1.6rem;font-weight:700;margin:0 0 .25rem}
    .page-sub{font-size:.88rem;color:var(--text-dim);margin:0 0 1.35rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem 1.45rem;margin-bottom:1.2rem;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
    .card h1{font-size:.95rem;font-weight:600;margin:0 0 1rem}
    label{display:block;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin:.8rem 0 .32rem}
    input{width:100%;padding:.62rem .85rem;background:var(--surface2);border:1px solid rgba(139,156,181,.22);border-radius:8px;color:var(--text);font-size:.94rem}
    input:focus{outline:0;border-color:var(--border-strong);box-shadow:0 0 0 3px rgba(0,229,200,.1)}
    button{margin:.75rem .4rem 0 0;padding:.52rem 1.05rem;font-size:.8rem;font-weight:600;border:0;border-radius:8px;cursor:pointer;background:linear-gradient(135deg,var(--accent),#0ab896);color:#031a16;font-family:var(--font)}
    button.secondary{background:transparent;color:var(--text);border:1px solid rgba(139,156,181,.32)}
    button.secondary:hover{border-color:var(--accent);color:var(--accent)}
    .alert{margin-top:1rem;padding:.85rem 1rem;border-radius:8px;font-size:.84rem}
    .alert.ok{background:rgba(0,229,200,.12);border:1px solid rgba(0,229,200,.35)}
    .alert.err{background:rgba(255,92,92,.1);border:1px solid rgba(255,92,92,.35);color:#ffb4b4}
    table{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:.65rem}
    th,td{border-bottom:1px solid rgba(139,156,181,.1);padding:.55rem .65rem}
    th{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);background:rgba(0,0,0,.28)}
    .alert{margin-top:1rem;padding:.85rem 1rem;border-radius:8px;font-size:.84rem}
    .alert.ok{background:rgba(0,229,200,.12);border:1px solid rgba(0,229,200,.35)}
    .alert.err{background:rgba(255,92,92,.1);border:1px solid rgba(255,92,92,.35);color:#ffb4b4}
  </style>
</head>
<body>
  <header class="nav">
    <a href="/index.html" class="brand"><span class="brand-mark"></span><span class="brand-text">CBLOS<span class="brand-sub">Lending Operations</span></span></a>
    <nav class="nav-links">
      <a href="/index.html">Dashboard</a>
      <a href="/customers.html">Clients</a>
      <a href="/officers.html">Officers</a>
      <a href="/loans.html">Applications</a>
      <a href="/collateral.html" class="active">Collateral</a>
      <a href="/documents.html">Documents</a>
      <a href="/credit.html">Risk</a>
      <a href="/approvals.html">Decisions</a>
      <a href="/disbursements.html">Treasury</a>
      <a href="/repayments.html">Servicing</a>
    </nav>
  </header>
  <div class="wrap">
    <h1 class="page-title">Collateral management</h1>
    <p class="page-sub">Security and pledge register.</p>
    <div class="card">
      <h1>New pledge</h1>
      <form id="form">
        <label for="applicationId">Application reference</label>
        <input type="number" id="applicationId" min="1" required>
        <label for="collateralType">Asset class</label>
        <input id="collateralType" required placeholder="e.g. Commercial real estate">
        <label for="estimatedValue">Appraised value</label>
        <input type="number" id="estimatedValue" step="0.01" min="0" required>
        <button type="submit">Add pledge</button>
      </form>
      <div id="msg"></div>
    </div>
    <div class="card">
      <h1>Schedule</h1>
      <label for="listAppId">Application reference</label>
      <input type="number" id="listAppId" min="1" required>
      <button type="button" class="secondary" id="loadList">Load</button>
      <div style="overflow-x:auto;margin-top:.75rem">
        <table>
          <thead><tr><th>ID</th><th>Class</th><th>Value</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    function showMsg(el, ok, t) { el.innerHTML = '<div class="alert ' + (ok ? 'ok' : 'err') + '">' + escapeHtml(t) + '</div>'; }
    function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    document.getElementById('form').addEventListener('submit', async function (e) {
      e.preventDefault();
      var msg = document.getElementById('msg'); msg.innerHTML = '';
      var appId = document.getElementById('applicationId').value;
      var body = { collateralType: document.getElementById('collateralType').value.trim(), estimatedValue: document.getElementById('estimatedValue').value };
      var res = await fetch('/api/collateral/add/' + encodeURIComponent(appId), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      var t = await res.text();
      if (!res.ok) { showMsg(msg, false, t); return; }
      showMsg(msg, true, 'Recorded');
      document.getElementById('listAppId').value = appId;
      loadCollateralList();
    });
    async function loadCollateralList() {
      var appId = document.getElementById('listAppId').value;
      var tb = document.getElementById('tbody'); tb.innerHTML = '';
      if (!appId) return;
      var res = await fetch('/api/collateral/loan/' + encodeURIComponent(appId));
      var text = await res.text();
      var data; try { data = JSON.parse(text); } catch (e) { data = null; }
      if (!res.ok) { tb.innerHTML = '<tr><td colspan="3">' + escapeHtml(text) + '</td></tr>'; return; }
      (data || []).forEach(function (c) {
        var tr = document.createElement('tr');
        tr.innerHTML = '<td>' + (c.id || '') + '</td><td>' + escapeHtml(String(c.collateralType || '')) + '</td><td>' + escapeHtml(String(c.estimatedValue != null ? c.estimatedValue : '')) + '</td>';
        tb.appendChild(tr);
      });
    }
    document.getElementById('loadList').onclick = loadCollateralList;
  </script>
</body>
</html>
