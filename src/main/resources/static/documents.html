<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Documents · CBLOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg0:#04060a; --bg1:#0a0f18; --surface:rgba(14,20,32,.75); --surface2:rgba(18,26,42,.92); --border:rgba(0,245,212,.1); --border-strong:rgba(0,245,212,.28); --accent:#00e5c8; --text:#eef2f7; --text-dim:#8b9cb5; --shadow:0 8px 40px rgba(0,0,0,.55); --radius:12px; --font:'Outfit',system-ui,sans-serif; --mono:'JetBrains Mono',monospace; }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:var(--font);background:var(--bg0);background-image:radial-gradient(ellipse 110% 60% at 50% -25%,rgba(0,229,200,.08),transparent 50%),linear-gradient(180deg,var(--bg1),var(--bg0) 45%);color:var(--text);line-height:1.5}
    header.nav{position:sticky;top:0;z-index:100;display:flex;flex-wrap:wrap;align-items:center;gap:.5rem 1.25rem;padding:.65rem 1.35rem;background:rgba(4,6,10,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
    .brand{display:flex;align-items:center;gap:.6rem;text-decoration:none;color:var(--text)}
    .brand-mark{width:11px;height:11px;border-radius:3px;background:linear-gradient(145deg,var(--accent),#4d7cff);box-shadow:0 0 16px rgba(0,229,200,.45)}
    .brand-text{font-weight:700;font-size:1.02rem}
    .brand-sub{display:block;font-size:.58rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.16em}
    .nav-links{display:flex;flex-wrap:wrap;gap:.1rem}
    .nav-links a{color:var(--text-dim);text-decoration:none;font-size:.76rem;padding:.38rem .65rem;border-radius:6px}
    .nav-links a:hover{color:var(--accent);background:rgba(0,229,200,.07)}
    .nav-links a.active{color:var(--accent);background:rgba(0,229,200,.14)}
    .wrap{max-width:1040px;margin:0 auto;padding:1.65rem 1.2rem 3rem}
    .page-title{font-size:1.6rem;font-weight:700;margin:0 0 .25rem}
    .page-sub{font-size:.88rem;color:var(--text-dim);margin:0 0 1.35rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem 1.45rem;margin-bottom:1.2rem;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
    .card h1{font-size:.95rem;font-weight:600;margin:0 0 1rem}
    label{display:block;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin:.8rem 0 .32rem}
    input[type="text"],input[type="number"]{width:100%;padding:.62rem .85rem;background:var(--surface2);border:1px solid rgba(139,156,181,.22);border-radius:8px;color:var(--text);font-size:.94rem}
    input:focus{outline:0;border-color:var(--border-strong);box-shadow:0 0 0 3px rgba(0,229,200,.1)}
    input[type="file"]{padding:.45rem;font-size:.78rem;max-width:280px;background:var(--surface2);border:1px solid rgba(139,156,181,.22);border-radius:8px;color:var(--text-dim)}
    button{margin:.4rem .4rem 0 0;padding:.5rem 1rem;font-size:.8rem;font-weight:600;border:0;border-radius:8px;cursor:pointer;background:linear-gradient(135deg,var(--accent),#0ab896);color:#031a16;font-family:var(--font)}
    button.secondary{background:transparent;color:var(--text);border:1px solid rgba(139,156,181,.32)}
    button.secondary:hover{border-color:var(--accent);color:var(--accent)}
    .row{display:flex;flex-wrap:wrap;gap:.45rem;align-items:center;margin-top:.5rem}
    table{width:100%;border-collapse:collapse;font-size:.76rem;margin-top:.65rem}
    th,td{border-bottom:1px solid rgba(139,156,181,.1);padding:.5rem .6rem;text-align:left}
    th{font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);background:rgba(0,0,0,.28)}
    pre{background:rgba(0,0,0,.4);padding:1rem;border-radius:8px;font-family:var(--mono);font-size:.76rem;color:var(--text-dim);border:1px solid var(--border);overflow:auto;max-height:260px;white-space:pre-wrap;margin-top:.75rem}
  </style>
</head>
<body>
  <header class="nav">
    <a href="/index.html" class="brand"><span class="brand-mark"></span><span class="brand-text">CBLOS<span class="brand-sub">Lending Operations</span></span></a>
    <nav class="nav-links">
      <a href="/index.html">Dashboard</a>
      <a href="/customers.html">Clients</a>
      <a href="/officers.html">Officers</a>
      <a href="/loans.html">Applications</a>
      <a href="/collateral.html">Collateral</a>
      <a href="/documents.html" class="active">Documents</a>
      <a href="/credit.html">Risk</a>
      <a href="/approvals.html">Decisions</a>
      <a href="/disbursements.html">Treasury</a>
      <a href="/repayments.html">Servicing</a>
    </nav>
  </header>
  <div class="wrap">
    <h1 class="page-title">Document vault</h1>
    <p class="page-sub">Imaging, certification, and retrieval.</p>
    <div class="card">
      <h1>Ingest</h1>
      <label for="applicationId">Application reference</label>
      <input type="number" id="applicationId" min="1" required>
      <label for="file">Artifact</label>
      <input type="file" id="file" required>
      <button type="button" id="btnUpload">Upload</button>
      <div id="msg"></div>
    </div>
    <div class="card">
      <h1>Index</h1>
      <label for="listAppId">Application reference</label>
      <input type="number" id="listAppId" min="1">
      <div class="row">
        <button type="button" class="secondary" id="btnList">Refresh index</button>
        <button type="button" class="secondary" id="btnValidateAll">Certify batch</button>
        <button type="button" class="secondary" id="btnReport">Compliance digest</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Doc ID</th><th>Name</th><th>Type</th><th>Certified</th><th></th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <pre id="report">—</pre>
    </div>
  </div>
  <script>
    function docIsValid(d) { if (d.isValid === true) return true; if (d.valid === true) return true; return false; }
    function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    async function refreshList() {
      var appId = document.getElementById('listAppId').value;
      var tb = document.getElementById('tbody'); tb.innerHTML = '';
      if (!appId) return;
      var res = await fetch('/api/documents/application/' + encodeURIComponent(appId));
      var text = await res.text();
      var data; try { data = JSON.parse(text); } catch (e) { data = null; }
      if (!res.ok) { tb.innerHTML = '<tr><td colspan="5">' + escapeHtml(text) + '</td></tr>'; return; }
      (data || []).forEach(function (doc) {
        var vid = doc.documentId != null ? doc.documentId : doc.id;
        var okVal = docIsValid(doc);
        var tr = document.createElement('tr');
        tr.innerHTML = '<td>' + vid + '</td><td>' + escapeHtml(String(doc.fileName || '')) + '</td><td>' + escapeHtml(String(doc.documentType || doc.fileType || '')) + '</td><td>' + (okVal ? 'Yes' : 'No') + '</td>' +
          '<td><button type="button" class="secondary btn-dl" data-id="' + vid + '">Retrieve</button> <button type="button" class="secondary btn-val" data-id="' + vid + '">Certify</button> <button type="button" class="secondary btn-st" data-id="' + vid + '">Status</button></td>';
        tb.appendChild(tr);
      });
      tb.querySelectorAll('.btn-dl').forEach(function (b) { b.onclick = function () { window.open('/api/documents/download/' + b.dataset.id, '_blank'); }; });
      tb.querySelectorAll('.btn-val').forEach(function (b) {
        b.onclick = async function () { var r = await fetch('/api/documents/validate/' + b.dataset.id, { method: 'PUT' }); alert(await r.text()); refreshList(); };
      });
      tb.querySelectorAll('.btn-st').forEach(function (b) {
        b.onclick = async function () { var r = await fetch('/api/documents/validate/' + b.dataset.id); alert(await r.text()); };
      });
    }
    document.getElementById('btnUpload').onclick = async function () {
      var msg = document.getElementById('msg'); msg.innerHTML = '';
      var appId = document.getElementById('applicationId').value;
      var fi = document.getElementById('file');
      if (!appId || !fi.files.length) { msg.textContent = 'Application and file required.'; return; }
      var fd = new FormData(); fd.append('file', fi.files[0]);
      var res = await fetch('/api/documents/upload/' + encodeURIComponent(appId), { method: 'POST', body: fd });
      var t = await res.text();
      msg.textContent = (res.ok ? '' : 'Error ') + t;
      document.getElementById('listAppId').value = appId;
      refreshList();
    };
    document.getElementById('btnList').onclick = refreshList;
    document.getElementById('btnValidateAll').onclick = async function () {
      var appId = document.getElementById('listAppId').value;
      if (!appId) return;
      var r = await fetch('/api/documents/validate-all/' + encodeURIComponent(appId), { method: 'PUT' });
      document.getElementById('report').textContent = await r.text();
      refreshList();
    };
    document.getElementById('btnReport').onclick = async function () {
      var appId = document.getElementById('listAppId').value;
      if (!appId) return;
      var r = await fetch('/api/documents/validation-report/' + encodeURIComponent(appId));
      document.getElementById('report').textContent = await r.text();
    };
  </script>
</body>
</html>
