<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Applications · CBLOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg0:#04060a; --bg1:#0a0f18; --surface:rgba(14,20,32,.75); --surface2:rgba(18,26,42,.92); --border:rgba(0,245,212,.1); --border-strong:rgba(0,245,212,.28); --accent:#00e5c8; --text:#eef2f7; --text-dim:#8b9cb5; --danger:#ff5c5c; --warn:#e6b84d; --ok:#00e5c8; --shadow:0 8px 40px rgba(0,0,0,.55); --radius:12px; --font:'Outfit',system-ui,sans-serif; --mono:'JetBrains Mono',monospace; }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:var(--font);background:var(--bg0);background-image:radial-gradient(ellipse 110% 60% at 50% -25%,rgba(0,229,200,.08),transparent 50%),linear-gradient(180deg,var(--bg1),var(--bg0) 45%);color:var(--text);line-height:1.5}
    header.nav{position:sticky;top:0;z-index:100;display:flex;flex-wrap:wrap;align-items:center;gap:.5rem 1.25rem;padding:.65rem 1.35rem;background:rgba(4,6,10,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
    .brand{display:flex;align-items:center;gap:.6rem;text-decoration:none;color:var(--text)}
    .brand-mark{width:11px;height:11px;border-radius:3px;background:linear-gradient(145deg,var(--accent),#4d7cff);box-shadow:0 0 16px rgba(0,229,200,.45)}
    .brand-text{font-weight:700;font-size:1.02rem}
    .brand-sub{display:block;font-size:.58rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.16em}
    .nav-links{display:flex;flex-wrap:wrap;gap:.1rem}
    .nav-links a{color:var(--text-dim);text-decoration:none;font-size:.76rem;padding:.38rem .65rem;border-radius:6px}
    .nav-links a:hover{color:var(--accent);background:rgba(0,229,200,.07)}
    .nav-links a.active{color:var(--accent);background:rgba(0,229,200,.14)}
    .wrap{max-width:1040px;margin:0 auto;padding:1.65rem 1.2rem 3rem}
    .page-title{font-size:1.6rem;font-weight:700;margin:0 0 .25rem}
    .page-sub{font-size:.88rem;color:var(--text-dim);margin:0 0 1.35rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem 1.45rem;margin-bottom:1.2rem;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
    .card h1,.card h2{font-size:.95rem;font-weight:600;margin:0 0 1rem}
    label{display:block;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin:.8rem 0 .32rem}
    input,select{width:100%;padding:.62rem .85rem;background:var(--surface2);border:1px solid rgba(139,156,181,.22);border-radius:8px;color:var(--text);font-family:var(--font);font-size:.94rem}
    input:focus,select:focus{outline:0;border-color:var(--border-strong);box-shadow:0 0 0 3px rgba(0,229,200,.1)}
    button{margin:.75rem .4rem 0 0;padding:.52rem 1.05rem;font-family:var(--font);font-size:.8rem;font-weight:600;border:0;border-radius:8px;cursor:pointer;background:linear-gradient(135deg,var(--accent),#0ab896);color:#031a16}
    button.secondary{background:transparent;color:var(--text);border:1px solid rgba(139,156,181,.32)}
    button.secondary:hover{border-color:var(--accent);color:var(--accent)}
    table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:.65rem}
    th,td{border-bottom:1px solid rgba(139,156,181,.1);padding:.55rem .65rem;text-align:left}
    th{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);background:rgba(0,0,0,.28)}
    .badge{display:inline-block;padding:.2rem .48rem;border-radius:4px;font-size:.62rem;font-weight:700;text-transform:uppercase}
    .badge-warn{background:rgba(230,184,77,.18);color:var(--warn)}
    .badge-ok{background:rgba(0,229,200,.14);color:var(--ok)}
    .badge-bad{background:rgba(255,92,92,.16);color:var(--danger)}
    pre{background:rgba(0,0,0,.4);padding:1rem;border-radius:8px;font-family:var(--mono);font-size:.78rem;color:var(--text-dim);border:1px solid var(--border);overflow:auto;white-space:pre-wrap}
  </style>
</head>
<body>
  <header class="nav">
    <a href="/index.html" class="brand"><span class="brand-mark"></span><span class="brand-text">CBLOS<span class="brand-sub">Lending Operations</span></span></a>
    <nav class="nav-links">
      <a href="/index.html">Dashboard</a>
      <a href="/customers.html">Clients</a>
      <a href="/officers.html">Officers</a>
      <a href="/loans.html" class="active">Applications</a>
      <a href="/collateral.html">Collateral</a>
      <a href="/documents.html">Documents</a>
      <a href="/credit.html">Risk</a>
      <a href="/approvals.html">Decisions</a>
      <a href="/disbursements.html">Treasury</a>
      <a href="/repayments.html">Servicing</a>
    </nav>
  </header>
  <div class="wrap">
    <h1 class="page-title">Credit applications</h1>
    <p class="page-sub">Origination and facility requests.</p>
    <div class="card">
      <h2>New facility request</h2>
      <form id="form">
        <label for="customerId">Client reference</label>
        <input type="number" id="customerId" min="1" required>
        <label for="loanAmount">Amount</label>
        <input type="number" id="loanAmount" step="0.01" min="0" required>
        <label for="loanType">Product</label>
        <select id="loanType"><option>Business</option><option>Personal</option></select>
        <button type="submit">Submit</button>
      </form>
    </div>
    <div class="card">
      <h2>Queue</h2>
      <button type="button" class="secondary" id="reload">Refresh</button>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Ref</th><th>Counterparty</th><th>Exposure</th><th>Product</th><th>Stage</th><th>Client</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <h2>Inquiry</h2>
      <label for="lookupId">Application reference</label>
      <input type="number" id="lookupId" min="1">
      <button type="button" class="secondary" id="btnDetail">Full record</button>
      <button type="button" class="secondary" id="btnStatus">Stage only</button>
      <pre id="lookupOut" style="margin-top:1rem">—</pre>
    </div>
  </div>
  <script>
    function companyName(loan) { if (!loan || !loan.customer) return '—'; return loan.customer.companyName || '—'; }
    function custId(loan) { if (!loan || !loan.customer) return '—'; return loan.customer.id != null ? loan.customer.id : '—'; }
    function statusClass(s) {
      if (!s) return 'badge-warn';
      var u = String(s).toUpperCase();
      if (u.indexOf('APPROV') >= 0) return 'badge-ok';
      if (u.indexOf('REJECT') >= 0) return 'badge-bad';
      return 'badge-warn';
    }
    function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    async function loadAll() {
      var res = await fetch('/api/loans/all');
      var text = await res.text();
      var data; try { data = JSON.parse(text); } catch (e) { data = null; }
      var tb = document.getElementById('tbody'); tb.innerHTML = '';
      if (!res.ok) { tb.innerHTML = '<tr><td colspan="6">' + escapeHtml(text) + '</td></tr>'; return; }
      (data || []).forEach(function (loan) {
        var st = loan.status || '';
        var tr = document.createElement('tr');
        tr.innerHTML = '<td>' + loan.applicationId + '</td><td>' + escapeHtml(companyName(loan)) + '</td><td>' + escapeHtml(String(loan.loanAmount != null ? loan.loanAmount : '')) + '</td><td>' + escapeHtml(String(loan.loanType || '')) + '</td><td><span class="badge ' + statusClass(st) + '">' + escapeHtml(String(st)) + '</span></td><td>' + custId(loan) + '</td>';
        tb.appendChild(tr);
      });
    }
    document.getElementById('form').addEventListener('submit', async function (e) {
      e.preventDefault();
      var cid = document.getElementById('customerId').value;
      var body = { loanAmount: document.getElementById('loanAmount').value, loanType: document.getElementById('loanType').value, submissionDate: new Date().toISOString().slice(0, 10) };
      var res = await fetch('/api/loans/submit/' + encodeURIComponent(cid), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (res.ok) { document.getElementById('form').reset(); loadAll(); } else alert(await res.text());
    });
    document.getElementById('reload').onclick = loadAll;
    document.getElementById('btnDetail').onclick = async function () {
      var id = document.getElementById('lookupId').value;
      var out = document.getElementById('lookupOut');
      if (!id) { out.textContent = 'Enter reference'; return; }
      var res = await fetch('/api/loans/' + encodeURIComponent(id));
      var t = await res.text();
      try { out.textContent = JSON.stringify(JSON.parse(t), null, 2); } catch (e) { out.textContent = t; }
    };
    document.getElementById('btnStatus').onclick = async function () {
      var id = document.getElementById('lookupId').value;
      var out = document.getElementById('lookupOut');
      if (!id) { out.textContent = 'Enter reference'; return; }
      var res = await fetch('/api/loans/status/' + encodeURIComponent(id));
      out.textContent = await res.text();
    };
    loadAll();
  </script>
</body>
</html>
