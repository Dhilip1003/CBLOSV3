<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clients · CBLOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0: #04060a; --bg1: #0a0f18;
      --surface: rgba(14, 20, 32, 0.75); --surface2: rgba(18, 26, 42, 0.92);
      --border: rgba(0, 245, 212, 0.1); --border-strong: rgba(0, 245, 212, 0.28);
      --accent: #00e5c8; --text: #eef2f7; --text-dim: #8b9cb5;
      --danger: #ff5c5c; --radius: 12px; --shadow: 0 8px 40px rgba(0, 0, 0, 0.55);
      --font: 'Outfit', system-ui, sans-serif; --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: var(--bg0);
      background-image:
        radial-gradient(ellipse 110% 60% at 50% -25%, rgba(0, 229, 200, 0.08), transparent 50%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 45%);
      color: var(--text);
      line-height: 1.5;
    }
    header.nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem 1.25rem;
      padding: 0.65rem 1.35rem;
      background: rgba(4, 6, 10, 0.88); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; color: var(--text); margin-right: 0.35rem; }
    .brand-mark { width: 11px; height: 11px; border-radius: 3px; background: linear-gradient(145deg, var(--accent), #4d7cff); box-shadow: 0 0 16px rgba(0, 229, 200, 0.45); }
    .brand-text { font-weight: 700; font-size: 1.02rem; letter-spacing: -0.03em; }
    .brand-sub { display: block; font-size: 0.58rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.16em; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 0.1rem; align-items: center; }
    .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 0.76rem; font-weight: 500; padding: 0.38rem 0.65rem; border-radius: 6px; transition: color 0.15s, background 0.15s; }
    .nav-links a:hover { color: var(--accent); background: rgba(0, 229, 200, 0.07); }
    .nav-links a.active { color: var(--accent); background: rgba(0, 229, 200, 0.14); }
    .wrap { max-width: 960px; margin: 0 auto; padding: 1.65rem 1.2rem 3rem; }
    .page-title { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.04em; margin: 0 0 0.25rem; }
    .page-sub { font-size: 0.88rem; color: var(--text-dim); margin: 0 0 1.35rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.3rem 1.45rem; margin-bottom: 1.2rem; box-shadow: var(--shadow); backdrop-filter: blur(10px); }
    .card h1 { font-size: 0.95rem; font-weight: 600; margin: 0 0 1rem; letter-spacing: -0.02em; }
    label { display: block; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-dim); margin: 0.8rem 0 0.32rem; }
    input { width: 100%; padding: 0.62rem 0.85rem; background: var(--surface2); border: 1px solid rgba(139, 156, 181, 0.22); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 0.94rem; }
    input:focus { outline: none; border-color: var(--border-strong); box-shadow: 0 0 0 3px rgba(0, 229, 200, 0.1); }
    input::placeholder { color: var(--text-dim); opacity: 0.65; }
    button { margin-top: 0.85rem; margin-right: 0.45rem; padding: 0.52rem 1.05rem; font-family: var(--font); font-size: 0.8rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; background: linear-gradient(135deg, var(--accent) 0%, #0ab896 100%); color: #031a16; }
    button.secondary { background: transparent; color: var(--text); border: 1px solid rgba(139, 156, 181, 0.32); }
    button.secondary:hover { border-color: var(--accent); color: var(--accent); }
    .alert { padding: 0.85rem 1rem; border-radius: 8px; margin-top: 1rem; white-space: pre-wrap; font-size: 0.84rem; }
    .alert.ok { background: rgba(0, 229, 200, 0.12); border: 1px solid rgba(0, 229, 200, 0.35); color: var(--text); }
    .alert.err { background: rgba(255, 92, 92, 0.1); border: 1px solid rgba(255, 92, 92, 0.35); color: #ffb4b4; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 0.65rem; }
    th, td { border-bottom: 1px solid rgba(139, 156, 181, 0.1); padding: 0.62rem 0.72rem; text-align: left; }
    th { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-weight: 600; background: rgba(0, 0, 0, 0.28); }
    tr:hover td { background: rgba(0, 229, 200, 0.02); }
  </style>
</head>
<body>
  <header class="nav">
    <a href="/index.html" class="brand"><span class="brand-mark"></span><span class="brand-text">CBLOS<span class="brand-sub">Lending Operations</span></span></a>
    <nav class="nav-links">
      <a href="/index.html">Dashboard</a>
      <a href="/customers.html" class="active">Clients</a>
      <a href="/officers.html">Officers</a>
      <a href="/loans.html">Applications</a>
      <a href="/collateral.html">Collateral</a>
      <a href="/documents.html">Documents</a>
      <a href="/credit.html">Risk</a>
      <a href="/approvals.html">Decisions</a>
      <a href="/disbursements.html">Treasury</a>
      <a href="/repayments.html">Servicing</a>
    </nav>
  </header>
  <div class="wrap">
    <h1 class="page-title">Corporate clients</h1>
    <p class="page-sub">Master legal entity registry.</p>
    <div class="card">
      <h1>New client</h1>
      <form id="form">
        <label for="taxId">Tax identifier</label>
        <input id="taxId" required autocomplete="off">
        <label for="companyName">Legal name</label>
        <input id="companyName" required>
        <label for="industryType">Sector</label>
        <input id="industryType" placeholder="Optional">
        <button type="submit">Register</button>
      </form>
      <div id="msg"></div>
    </div>
    <div class="card">
      <h1>Directory</h1>
      <button type="button" class="secondary" id="reload">Refresh</button>
      <div style="overflow-x:auto;">
        <table>
          <thead><tr><th>ID</th><th>Tax ID</th><th>Entity</th><th>Sector</th><th></th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    function showMsg(el, ok, text) {
      el.innerHTML = '<div class="alert ' + (ok ? 'ok' : 'err') + '">' + escapeHtml(text) + '</div>';
    }
    function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    async function loadAll() {
      var res = await fetch('/api/customers/all');
      var text = await res.text();
      var data; try { data = JSON.parse(text); } catch (e) { data = null; }
      var tb = document.getElementById('tbody');
      tb.innerHTML = '';
      if (!res.ok) { tb.innerHTML = '<tr><td colspan="5">' + escapeHtml(text) + '</td></tr>'; return; }
      (data || []).forEach(function (c) {
        var tr = document.createElement('tr');
        tr.innerHTML = '<td>' + c.id + '</td><td>' + escapeHtml(String(c.taxId || '')) + '</td><td>' + escapeHtml(String(c.companyName || '')) + '</td><td>' + escapeHtml(String(c.industryType || '—')) + '</td>' +
          '<td><button type="button" class="secondary" data-id="' + c.id + '">Copy ID</button></td>';
        tr.querySelector('button').onclick = function () { navigator.clipboard.writeText(String(c.id)); };
        tb.appendChild(tr);
      });
    }
    document.getElementById('form').addEventListener('submit', async function (e) {
      e.preventDefault();
      var msg = document.getElementById('msg');
      msg.innerHTML = '';
      var body = { taxId: document.getElementById('taxId').value.trim(), companyName: document.getElementById('companyName').value.trim(), industryType: document.getElementById('industryType').value.trim() || undefined };
      var res = await fetch('/api/customers/onboard', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      var text = await res.text();
      if (!res.ok) { showMsg(msg, false, text); return; }
      var saved; try { saved = JSON.parse(text); } catch (e2) { saved = {}; }
      showMsg(msg, true, 'Client reference: ' + (saved.id != null ? saved.id : text));
      document.getElementById('form').reset();
      loadAll();
    });
    document.getElementById('reload').onclick = loadAll;
    loadAll();
  </script>
</body>
</html>
