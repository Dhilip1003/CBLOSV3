<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="cblos-card card p-4">
      <h1 class="h4 mb-1">CBLOS Login</h1>
      <p class="page-sub mb-4">Corporate users and bank staff sign in here.</p>
      <form (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label small text-secondary" for="email">Email</label>
          <input id="email" type="email" class="form-control" [(ngModel)]="email" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label small text-secondary" for="password">Password</label>
          <input id="password" type="password" class="form-control" [(ngModel)]="password" name="password" required>
        </div>
        @if (error) {
          <div class="alert alert-danger py-2">{{ error }}</div>
        }
        <button type="submit" class="btn btn-accent w-100">Sign in</button>
      </form>
      <p class="small text-secondary mt-4 mb-0">
        Demo: customer&#64;demo.com / officer&#64;bank.com / manager&#64;bank.com — password: <strong>password</strong>
      </p>
    </div>
  </div>
</div>
